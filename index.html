<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salvar e listar nomes</title>
</head>
<body>
  <h1>Salvar nome</h1>

  <form id="form-nome">
    <input type="text" id="nome" placeholder="Digite um nome" required />
    <button type="submit">Enviar</button>
  </form>

  <p id="mensagem"></p>

  <h2>Nomes enviados</h2>
  <ul id="lista-nomes"></ul>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://vpishybqzeflcvkdbhlq.supabase.co";
    const SUPABASE_KEY = "sb_publishable_kWSkLBhVi1O0IKljgdko_A_Io1YFJr1";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById("form-nome");
    const inputNome = document.getElementById("nome");
    const mensagem = document.getElementById("mensagem");
    const listaNomes = document.getElementById("lista-nomes");

    async function carregarNomes() {
      listaNomes.innerHTML = "<li>Carregando...</li>";

      const { data, error } = await supabaseClient
        .from("nomes")
        .select("id, nome")
        .order("id", { ascending: false });

      if (error) {
        listaNomes.innerHTML = "<li>Erro ao carregar nomes.</li>";
        return;
      }

      if (!data || data.length === 0) {
        listaNomes.innerHTML = "<li>Nenhum nome enviado ainda.</li>";
        return;
      }

      listaNomes.innerHTML = "";

      data.forEach(function (item) {
        const li = document.createElement("li");
        li.textContent = item.nome;
        listaNomes.appendChild(li);
      });
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const nomeDigitado = inputNome.value.trim();

      if (!nomeDigitado) {
        mensagem.textContent = "Digite um nome.";
        return;
      }

      const { error } = await supabaseClient
        .from("nomes")
        .insert([{ nome: nomeDigitado }]);

      if (error) {
        mensagem.textContent = "Erro ao salvar: " + error.message;
        return;
      }

      mensagem.textContent = "Nome salvo com sucesso!";
      inputNome.value = "";

      carregarNomes();
    });

    carregarNomes();
  </script>
</body>
</html>
